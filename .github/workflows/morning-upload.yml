name: YouTube Auto Uploader - Morning

on:
  schedule:
    # Run at 10:00 AM UTC = 3:30 PM IST (Kerala)
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  upload-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-auth google-auth-oauthlib google-api-python-client gtts

      - name: Create credentials from secrets
        env:
          YOUTUBE_TOKEN_DATA: ${{ secrets.YOUTUBE_TOKEN_DATA }}
          YOUTUBE_CLIENT_CONFIG: ${{ secrets.YOUTUBE_CLIENT_CONFIG }}
        run: |
          mkdir -p youtube
          echo "$YOUTUBE_TOKEN_DATA" | base64 -d > youtube/token.json
          echo "$YOUTUBE_CLIENT_CONFIG" | base64 -d > youtube/credentials.json

      - name: Run YouTube auto pipeline
        run: python automation/auto_pipeline.py daily

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            youtube/upload-log.json
            youtube/temp/*
          retention-days: 7